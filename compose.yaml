# provide a name if you wish
# name: btlz-test

networks:
  postgres-net:
    driver: bridge

volumes:
  postgres-vol:
    driver: local

services:

  postgres:
    container_name: postgres

    image: postgres:16.1-alpine

    env_file:
      - path: example.env
        required: true
      - path: .env
        required: false

    environment:
      PGPORT: ${POSTGRES_PORT:-5432}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-vol:/var/lib/postgresql/data

    networks:
      - postgres-net

    expose:
      - ${POSTGRES_PORT:-5432}

    ports:
      - ${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped


  app:
    container_name: app

    build:
      context: .
      dockerfile: Dockerfile

    env_file:
      - path: example.env
        required: true
      - path: .env
        required: false

    environment:
      POSTGRES_HOST: postgres

    ports:
      - ${APP_PORT:-5000}:${APP_PORT:-5000}

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres-net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-5000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5

    command: [ "npm", "run", "start" ]
    restart: unless-stopped
